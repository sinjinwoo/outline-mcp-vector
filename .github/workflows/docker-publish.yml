name: Build & Push Docker Image

on:
  push:
    tags: ["v*"]          # e.g. v1.0.0 → tagged release
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  # Set your Docker Hub username in repo Settings → Secrets → DOCKERHUB_USERNAME
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/outline-mcp-vector

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build for both amd64 (servers) and arm64 (Apple M-series / Raspberry Pi)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Determine image tags:
      #   push tag v*        → :v1.0.0 + :1.0 + :latest
      #   workflow_dispatch  → :latest + :<short-sha>
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache for faster rebuilds
          cache-from: type=gha,scope=outline-mcp-vector
          cache-to: type=gha,mode=max,scope=outline-mcp-vector
