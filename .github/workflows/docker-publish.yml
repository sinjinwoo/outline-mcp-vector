name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]          # e.g. v1.0.0 → tagged release
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  # Set your Docker Hub username in repo Settings → Secrets → DOCKERHUB_USERNAME
  INDEXER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rag-indexer
  MCP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rag-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: indexer
            dockerfile: indexer/Dockerfile
            image_env: INDEXER_IMAGE
          - service: mcp
            dockerfile: mcpserver/Dockerfile
            image_env: MCP_IMAGE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build for both amd64 (servers) and arm64 (Apple M-series / Raspberry Pi)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Determine image tags:
      #   push to main  → :latest  + :<short-sha>
      #   push tag v*   → :v1.0.0  + :latest
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache for faster rebuilds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
